name: Fetch Feed

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Switch to feed-output branch
        run: |
          if git rev-parse --verify origin/feed-output >/dev/null 2>&1; then
            git checkout feed-output
          else
            git checkout -b feed-output
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Run
        run: cargo run --release

      - name: Commit and push
        run: |
          git config user.name "teremo4ek"
          git config user.email "teremo4ek@gmail.com"
          git add -f output/rust-blog.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "update feed output"
          git push -u origin feed-output
